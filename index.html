<style>
  body {
    background-color: #0a0a0a; /* Slightly darker for better contrast */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .mega-text {
    font-family: 'Josefin Sans', sans-serif;
    /* BIGGER FONT SIZE */
    font-size: 15rem; 
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -5px; /* Tighter look for large typography */
    
    /* Clipping the background to the text */
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;

    /* Background Display Properties */
    background-size: cover;
    background-position: center;
    
    /* Animation: Cycles images and moves them */
    animation: multiImageShift 20s infinite ease-in-out;
  }
