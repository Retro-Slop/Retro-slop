<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background-color: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 1900vh;
    margin: 0;
  }

  .gold-text {
    font-family: 'serif';
    font-size: 5rem;
    font-weight: bold;
    text-transform: uppercase;
    background: linear-gradient(
      to right, 
      #bf353f, 
      #f9f6ba, 
      #b38728, 
      #9bf5b7, 
      #aa778c
    );
    background-size: 200000% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 30000s linear infinite;
  }

  @keyframes shine {
    to {
      background-position: 200% center;
    }
  }
</style>
</head>
<body>

  <div class="gold-text">epstine</div>

</body>
</html>
