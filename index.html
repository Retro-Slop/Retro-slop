<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fancy Gold Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0c0c0c; /* Dark background to make gold pop */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .fancy-gold {
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            
            /* Creating the Gold Gradient */
            background: linear-gradient(
                to right, 
                #bf953f 0%, 
                #fcf6ba 25%, 
                #b38728 50%, 
                #fbf5b7 75%, 
                #aa771c 100%
            );
            background-size: 200% auto;
            
            /* Clipping the background to the text */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* The Shine Animation */
            animation: shine 4s linear infinite;
            
            /* Adding a subtle drop shadow for depth */
            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.5));
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }
    </style>
</head>
<body>

    <div class="fancy-gold">say wallahi bro say wallahi bro</div>

</body>
</html>
